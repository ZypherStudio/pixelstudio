<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8-Bit Chiptune Maker</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  body{background:#121214;color:#e0e0e0;font-family:'Inter',sans-serif;}
  .grid-bg{background-image:linear-gradient(rgba(255,255,255,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.05) 1px,transparent 1px);background-size:20px 20px;}
  .step-col{width:40px;height:100%;border-right:1px solid #2a2a32;position:relative;}
  .step-col.active{background:rgba(255,121,121,0.2);}
  .note-row{height:30px;border-bottom:1px solid #2a2a32;display:flex;align-items:center;background:#1e1e24;}
  .note-label{width:60px;font-size:10px;font-weight:bold;text-align:center;border-right:2px solid #eb4d4b;}
  .cell{width:40px;height:100%;border-right:1px solid rgba(255,255,255,0.05);cursor:pointer;transition:background 0.1s;}
  .cell:hover{background:rgba(255,255,255,0.1);}
  .cell.active{background:#ff7979;box-shadow:inset 0 0 10px rgba(0,0,0,0.5);}
  .knob-track{height:8px;background:#121214;border-radius:4px;border:1px solid #2a2a32;}
  input[type=range]{accent-color:#ff7979;}
</style>
</head>
<body class="h-screen w-screen flex flex-col">
  <header class="h-16 bg-[#1e1e24] border-b border-[#2a2a32] flex items-center justify-between px-6 shrink-0 shadow-md z-30">
    <div class="flex items-center gap-4">
      <a href="menu.html" class="w-8 h-8 rounded bg-[#121214] flex items-center justify-center text-gray-400 hover:text-white border border-[#2a2a32]"><i class="fa-solid fa-arrow-left"></i></a>
      <h1 class="font-bold text-white uppercase tracking-wide flex items-center gap-2"><i class="fa-solid fa-music text-[#ff7979]"></i> 8-Bit Chiptune</h1>
    </div>
    <div class="flex gap-4 items-center">
      <div class="text-xs font-bold text-gray-400 uppercase">Waveform:</div>
      <select id="sel-wave" class="bg-[#121214] border border-[#2a2a32] text-sm px-3 py-1 rounded text-white outline-none">
        <option value="square">Square (Classic)</option>
        <option value="sawtooth">Sawtooth (Harsh)</option>
        <option value="triangle">Triangle (Soft)</option>
      </select>
    </div>
  </header>

  <main class="flex-1 flex overflow-hidden">
    <!-- Controls Sidebar -->
    <aside class="w-64 bg-[#1e1e24] border-r border-[#2a2a32] flex flex-col z-20 shadow-xl p-5">
      <div class="mb-8">
        <button id="btn-play" class="w-full bg-[#ff7979] hover:bg-[#eb4d4b] text-white py-3 rounded-lg font-bold uppercase text-sm shadow-[0_0_15px_rgba(255,121,121,0.4)] transition-all flex items-center justify-center gap-2 mb-4">
          <i class="fa-solid fa-play"></i> Play Sequence
        </button>
        <button id="btn-clear" class="w-full bg-[#121214] hover:bg-[#2a2a32] border border-[#2a2a32] text-gray-400 py-2 rounded-lg font-bold uppercase text-xs transition-colors">
          <i class="fa-solid fa-trash"></i> Clear Track
        </button>
      </div>

      <div class="mb-8">
        <h2 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-4">Tempo (BPM)</h2>
        <input type="range" id="bpm-slider" min="60" max="240" value="120" class="w-full">
        <div class="text-right text-xs font-mono font-bold text-white mt-1" id="bpm-val">120</div>
      </div>

      <div class="border-t border-[#2a2a32] pt-6">
        <h2 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-4">SFX Generator</h2>
        <div class="grid grid-cols-2 gap-2">
          <button class="bg-[#121214] border border-[#2a2a32] hover:border-[#ff7979] text-gray-300 py-2 rounded text-xs font-bold sfx-btn" data-sfx="jump">Jump</button>
          <button class="bg-[#121214] border border-[#2a2a32] hover:border-[#ff7979] text-gray-300 py-2 rounded text-xs font-bold sfx-btn" data-sfx="shoot">Shoot</button>
          <button class="bg-[#121214] border border-[#2a2a32] hover:border-[#ff7979] text-gray-300 py-2 rounded text-xs font-bold sfx-btn" data-sfx="coin">Coin</button>
          <button class="bg-[#121214] border border-[#2a2a32] hover:border-[#ff7979] text-gray-300 py-2 rounded text-xs font-bold sfx-btn" data-sfx="hit">Hit</button>
        </div>
      </div>
    </aside>

    <!-- Piano Roll Tracker -->
    <section class="flex-1 overflow-auto bg-[#121214] relative pb-20">
      <div id="tracker" class="inline-block min-w-full">
        <!-- Generated by JS -->
      </div>
    </section>
  </main>

  <script>
    const E = id => document.getElementById(id);
    let audioCtx = null;
    
    // Notes C5 down to C4
    const notes = [
      { name: 'C5', freq: 523.25 },
      { name: 'B4', freq: 493.88 },
      { name: 'A#4', freq: 466.16 },
      { name: 'A4', freq: 440.00 },
      { name: 'G#4', freq: 415.30 },
      { name: 'G4', freq: 392.00 },
      { name: 'F#4', freq: 369.99 },
      { name: 'F4', freq: 349.23 },
      { name: 'E4', freq: 329.63 },
      { name: 'D#4', freq: 311.13 },
      { name: 'D4', freq: 293.66 },
      { name: 'C#4', freq: 277.18 },
      { name: 'C4', freq: 261.63 }
    ];
    
    const numSteps = 32;
    let grid = Array(notes.length).fill().map(() => Array(numSteps).fill(false));
    let isPlaying = false;
    let currentStep = 0;
    let nextNoteTime = 0;
    let intervalId;
    let lookahead = 25.0; // ms
    let scheduleAheadTime = 0.1; // s

    // Build UI
    const tracker = E('tracker');
    
    // Header row for steps
    const headerRow = document.createElement('div');
    headerRow.className = 'note-row bg-[#18181d] border-b-2 border-[#2a2a32]';
    headerRow.innerHTML = '<div class="note-label border-none"></div>';
    for(let i=0; i<numSteps; i++) {
      const step = document.createElement('div');
      step.className = `step-col text-center text-[9px] text-gray-600 font-bold leading-8 border-none ${i%4===0?'bg-[#2a2a32]/20':''}`;
      step.id = `step-head-${i}`;
      step.textContent = i+1;
      headerRow.appendChild(step);
    }
    tracker.appendChild(headerRow);

    // Rows
    notes.forEach((note, rIdx) => {
      const row = document.createElement('div');
      row.className = 'note-row';
      const label = document.createElement('div');
      label.className = 'note-label text-gray-400';
      label.textContent = note.name;
      // Play sound on label click
      label.onmousedown = () => playTone(note.freq, E('sel-wave').value, 0.2);
      row.appendChild(label);
      
      for(let cIdx=0; cIdx<numSteps; cIdx++) {
        const cell = document.createElement('div');
        cell.className = `cell ${cIdx%4===0 ? 'border-l-2 border-l-[#2a2a32]' : ''}`;
        cell.id = `cell-${rIdx}-${cIdx}`;
        cell.onmousedown = (e) => {
          grid[rIdx][cIdx] = !grid[rIdx][cIdx];
          cell.classList.toggle('active', grid[rIdx][cIdx]);
          if(grid[rIdx][cIdx]) playTone(note.freq, E('sel-wave').value, 0.1);
        };
        row.appendChild(cell);
      }
      tracker.appendChild(row);
    });

    E('btn-clear').onclick = () => {
      grid = Array(notes.length).fill().map(() => Array(numSteps).fill(false));
      document.querySelectorAll('.cell').forEach(c => c.classList.remove('active'));
    };

    E('bpm-slider').oninput = e => E('bpm-val').textContent = e.target.value;

    function initAudio() {
      if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playTone(freq, type, duration) {
      initAudio();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      
      // Envelope to avoid clicking
      gain.gain.setValueAtTime(0, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration - 0.01);
      
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    function scheduleNote(step, time) {
      const type = E('sel-wave').value;
      const bpm = E('bpm-slider').value;
      const secPerBeat = 60.0 / bpm;
      const duration = secPerBeat * 0.25; // 16th note

      notes.forEach((note, rIdx) => {
        if(grid[rIdx][step]) {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = type;
          osc.frequency.value = note.freq;
          
          gain.gain.setValueAtTime(0, time);
          gain.gain.linearRampToValueAtTime(0.3, time + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.01, time + duration);
          
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start(time);
          osc.stop(time + duration);
        }
      });

      // UI Update must use setTimeout to sync visually
      setTimeout(() => {
        for(let i=0; i<numSteps; i++){
          E(`step-head-${i}`).classList.remove('bg-[#ff7979]','text-white');
        }
        E(`step-head-${step}`).classList.add('bg-[#ff7979]','text-white');
      }, (time - audioCtx.currentTime) * 1000);
    }

    function scheduler() {
      while (nextNoteTime < audioCtx.currentTime + scheduleAheadTime) {
        scheduleNote(currentStep, nextNoteTime);
        nextNote();
      }
      intervalId = setTimeout(scheduler, lookahead);
    }

    function nextNote() {
      const secPerBeat = 60.0 / E('bpm-slider').value;
      nextNoteTime += 0.25 * secPerBeat; // 16th notes
      currentStep++;
      if(currentStep === numSteps) currentStep = 0;
    }

    E('btn-play').onclick = () => {
      initAudio();
      const btn = E('btn-play');
      if(isPlaying) {
        isPlaying = false;
        clearTimeout(intervalId);
        btn.innerHTML = '<i class="fa-solid fa-play"></i> Play Sequence';
        btn.classList.replace('bg-[#eb4d4b]', 'bg-[#ff7979]');
      } else {
        isPlaying = true;
        if(audioCtx.state === 'suspended') audioCtx.resume();
        currentStep = 0;
        nextNoteTime = audioCtx.currentTime + 0.05;
        scheduler();
        btn.innerHTML = '<i class="fa-solid fa-stop"></i> Stop Sequence';
        btn.classList.replace('bg-[#ff7979]', 'bg-[#eb4d4b]');
      }
    };

    // SFX Generators
    document.querySelectorAll('.sfx-btn').forEach(btn => {
      btn.onclick = () => {
        initAudio();
        const type = btn.dataset.sfx;
        const t = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if(type === 'jump') {
          osc.type = 'square';
          osc.frequency.setValueAtTime(300, t);
          osc.frequency.exponentialRampToValueAtTime(600, t + 0.1);
          gain.gain.setValueAtTime(0.3, t);
          gain.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
          osc.start(t); osc.stop(t+0.2);
        }
        else if(type === 'shoot') {
          osc.type = 'square';
          osc.frequency.setValueAtTime(800, t);
          osc.frequency.exponentialRampToValueAtTime(100, t + 0.2);
          gain.gain.setValueAtTime(0.3, t);
          gain.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
          osc.start(t); osc.stop(t+0.2);
        }
        else if(type === 'coin') {
          osc.type = 'square';
          osc.frequency.setValueAtTime(987.77, t); // B5
          osc.frequency.setValueAtTime(1318.51, t + 0.1); // E6
          gain.gain.setValueAtTime(0.3, t);
          gain.gain.linearRampToValueAtTime(0, t + 0.4);
          osc.start(t); osc.stop(t+0.4);
        }
        else if(type === 'hit') {
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(100, t);
          osc.frequency.exponentialRampToValueAtTime(10, t + 0.1);
          gain.gain.setValueAtTime(0.4, t);
          gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
          osc.start(t); osc.stop(t+0.1);
        }
      };
    });

  </script>
</body>
</html>
