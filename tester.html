<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprite Tester</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  body{background:#121214;color:#e0e0e0;font-family:'Inter',sans-serif;overflow:hidden;}
  .pixelated{image-rendering:pixelated;image-rendering:crisp-edges;}
  .checkered{background-color:#2a2a2a;background-image:linear-gradient(45deg,#1e1e1e 25%,transparent 25%,transparent 75%,#1e1e1e 75%,#1e1e1e),linear-gradient(45deg,#1e1e1e 25%,transparent 25%,transparent 75%,#1e1e1e 75%,#1e1e1e);background-size:16px 16px;background-position:0 0,8px 8px;}
</style>
</head>
<body class="h-screen w-screen flex flex-col">
  <header class="h-16 bg-[#1e1e24] border-b border-[#2a2a32] flex items-center justify-between px-6 shrink-0 shadow-md z-30">
    <div class="flex items-center gap-4">
      <a href="menu.html" class="w-8 h-8 rounded bg-[#121214] flex items-center justify-center text-gray-400 hover:text-white border border-[#2a2a32]"><i class="fa-solid fa-arrow-left"></i></a>
      <h1 class="font-bold text-white uppercase tracking-wide flex items-center gap-2"><i class="fa-solid fa-person-running text-[#7ed6df]"></i> Sprite Tester</h1>
    </div>
    <div class="flex gap-4 items-center">
      <input type="file" id="file-upload" accept="image/*" class="hidden">
      <button id="btn-upload" class="bg-[#7ed6df] hover:bg-[#22a6b3] text-[#121214] px-6 py-2 rounded font-bold uppercase text-xs shadow-[0_0_15px_rgba(126,214,223,0.4)] transition-all flex items-center gap-2">
        <i class="fa-solid fa-upload"></i> Load Sprite Sheet
      </button>
    </div>
  </header>

  <main class="flex-1 flex overflow-hidden">
    <!-- Controls Sidebar -->
    <aside class="w-80 bg-[#1e1e24] border-r border-[#2a2a32] flex flex-col z-20 shadow-xl p-5 overflow-y-auto">
      <h2 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-4">Sprite Settings</h2>
      
      <div class="grid grid-cols-2 gap-4 mb-6">
        <div>
          <label class="block text-xs font-bold text-gray-400 mb-1">Frame Width (px)</label>
          <input type="number" id="frame-w" value="32" min="1" class="w-full bg-[#121214] border border-[#2a2a32] rounded px-3 py-2 text-white outline-none focus:border-[#7ed6df]">
        </div>
        <div>
          <label class="block text-xs font-bold text-gray-400 mb-1">Frame Height (px)</label>
          <input type="number" id="frame-h" value="32" min="1" class="w-full bg-[#121214] border border-[#2a2a32] rounded px-3 py-2 text-white outline-none focus:border-[#7ed6df]">
        </div>
      </div>
      
      <div class="bg-[#121214] border border-[#2a2a32] rounded p-3 mb-6">
        <div class="flex justify-between text-xs text-gray-400 mb-1">
          <span>Sheet Info:</span>
          <span id="sheet-info" class="font-bold text-white">0x0 (0 Frames)</span>
        </div>
      </div>

      <h2 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-4">Playback</h2>
      <div class="flex gap-2 mb-4">
        <button id="btn-play" class="flex-1 bg-[#7ed6df] text-[#121214] py-2 rounded font-bold transition-all"><i class="fa-solid fa-play"></i></button>
        <button id="btn-pause" class="flex-1 bg-[#121214] text-white border border-[#2a2a32] py-2 rounded font-bold transition-all"><i class="fa-solid fa-pause"></i></button>
      </div>

      <div class="mb-4">
        <div class="flex justify-between text-xs font-bold text-gray-400 mb-1">
          <span>Speed (FPS)</span>
          <span id="fps-val" class="text-[#7ed6df]">12</span>
        </div>
        <input type="range" id="fps-slider" min="1" max="60" value="12" class="w-full accent-[#7ed6df]">
      </div>

      <div>
        <div class="flex justify-between text-xs font-bold text-gray-400 mb-1">
          <span>Scrub Frame</span>
          <span id="frame-val" class="text-white">1</span>
        </div>
        <input type="range" id="frame-slider" min="0" max="0" value="0" class="w-full accent-[#7ed6df]">
      </div>

    </aside>

    <!-- Viewport -->
    <section class="flex-1 flex flex-col p-8 bg-[#0d0d0f] items-center justify-center">
      <div class="text-xs font-bold text-gray-500 uppercase mb-4 tracking-widest">Preview (Scaled x8)</div>
      <div id="viewport-container" class="checkered border-2 border-[#2a2a32] shadow-[0_0_50px_rgba(0,0,0,0.8)] rounded-lg overflow-hidden relative" style="width:256px; height:256px;">
        <canvas id="main-canvas" class="pixelated absolute top-0 left-0 w-full h-full"></canvas>
      </div>
      
      <!-- Full Sheet Mini Preview -->
      <div class="mt-8 bg-[#1e1e24] border border-[#2a2a32] p-2 rounded-lg max-w-full overflow-x-auto">
        <canvas id="sheet-canvas" class="pixelated h-16"></canvas>
      </div>
    </section>
  </main>

  <script>
    const E = id => document.getElementById(id);
    const canvas = E('main-canvas');
    const ctx = canvas.getContext('2d');
    const sheetCanvas = E('sheet-canvas');
    const sheetCtx = sheetCanvas.getContext('2d');
    
    let spriteSheet = null;
    let isPlaying = true;
    let currentFrame = 0;
    let totalFrames = 0;
    let fps = 12;
    let lastTime = 0;
    let animId;

    function parseSheet() {
      if(!spriteSheet) return;
      const fw = parseInt(E('frame-w').value) || 32;
      const fh = parseInt(E('frame-h').value) || 32;
      
      // Calculate total frames (assuming horizontal strip for simplicity, or grid)
      const cols = Math.floor(spriteSheet.width / fw);
      const rows = Math.floor(spriteSheet.height / fh);
      totalFrames = cols * rows;

      if(totalFrames === 0) totalFrames = 1;

      E('sheet-info').textContent = `${spriteSheet.width}x${spriteSheet.height} (${totalFrames} Frames)`;
      
      E('frame-slider').max = totalFrames - 1;
      
      // Adjust preview container
      const container = E('viewport-container');
      container.style.width = (fw * 8) + 'px';
      container.style.height = (fh * 8) + 'px';
      
      canvas.width = fw;
      canvas.height = fh;
      
      currentFrame = 0;
    }

    function render(time) {
      if(!spriteSheet) {
        requestAnimationFrame(render);
        return;
      }
      
      if(isPlaying && time - lastTime > (1000/fps)) {
        currentFrame = (currentFrame + 1) % totalFrames;
        E('frame-slider').value = currentFrame;
        E('frame-val').textContent = currentFrame + 1;
        lastTime = time;
      }

      const fw = parseInt(E('frame-w').value) || 32;
      const fh = parseInt(E('frame-h').value) || 32;
      const cols = Math.floor(spriteSheet.width / fw) || 1;
      
      const col = currentFrame % cols;
      const row = Math.floor(currentFrame / cols);
      
      const sx = col * fw;
      const sy = row * fh;

      ctx.clearRect(0,0,fw,fh);
      ctx.drawImage(spriteSheet, sx, sy, fw, fh, 0, 0, fw, fh);

      // Render full sheet with highlighter
      sheetCtx.clearRect(0,0,sheetCanvas.width,sheetCanvas.height);
      sheetCtx.drawImage(spriteSheet, 0, 0);
      sheetCtx.strokeStyle = '#7ed6df';
      sheetCtx.lineWidth = 2;
      sheetCtx.strokeRect(sx, sy, fw, fh);

      animId = requestAnimationFrame(render);
    }

    E('btn-upload').onclick = () => E('file-upload').click();
    E('file-upload').onchange = e => {
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        const img = new Image();
        img.onload = () => {
          spriteSheet = img;
          sheetCanvas.width = img.width;
          sheetCanvas.height = img.height;
          parseSheet();
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    };

    ['frame-w', 'frame-h'].forEach(id => E(id).onchange = parseSheet);
    
    E('fps-slider').oninput = e => { fps = parseInt(e.target.value); E('fps-val').textContent = fps; };
    
    E('btn-play').onclick = () => isPlaying = true;
    E('btn-pause').onclick = () => isPlaying = false;
    
    E('frame-slider').oninput = e => {
      isPlaying = false;
      currentFrame = parseInt(e.target.value);
      E('frame-val').textContent = currentFrame + 1;
    };

    animId = requestAnimationFrame(render);
  </script>
</body>
</html>
