<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retro Filter Lab</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  body{background:#121214;color:#e0e0e0;font-family:'Inter',sans-serif;overflow:hidden;}
  .pixelated{image-rendering:pixelated;image-rendering:crisp-edges;}
  .checkered{background-color:#2a2a2a;background-image:linear-gradient(45deg,#1e1e1e 25%,transparent 25%,transparent 75%,#1e1e1e 75%,#1e1e1e),linear-gradient(45deg,#1e1e1e 25%,transparent 25%,transparent 75%,#1e1e1e 75%,#1e1e1e);background-size:16px 16px;background-position:0 0,8px 8px;}
  .filter-btn{transition:all 0.2s;}
  .filter-btn.active{border-color:#badc58;box-shadow:inset 0 0 10px rgba(186,220,88,0.2);}
  #preview-container{width:100%;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  #main-canvas{max-width:100%;max-height:100%;object-fit:contain;}
</style>
</head>
<body class="h-screen w-screen flex flex-col">
  <header class="h-16 bg-[#1e1e24] border-b border-[#2a2a32] flex items-center justify-between px-6 shrink-0 shadow-md z-30">
    <div class="flex items-center gap-4">
      <a href="menu.html" class="w-8 h-8 rounded bg-[#121214] flex items-center justify-center text-gray-400 hover:text-white border border-[#2a2a32]"><i class="fa-solid fa-arrow-left"></i></a>
      <h1 class="font-bold text-white uppercase tracking-wide flex items-center gap-2"><i class="fa-solid fa-camera-retro text-[#badc58]"></i> Retro Filter Lab</h1>
    </div>
    <div class="flex gap-4 items-center">
      <input type="file" id="file-upload" accept="image/*" class="hidden">
      <button id="btn-upload" class="bg-[#121214] hover:bg-[#2a2a32] text-white border border-[#2a2a32] px-4 py-2 rounded font-bold uppercase text-xs transition-colors"><i class="fa-solid fa-upload"></i> Upload Photo</button>
      <button id="btn-save" class="bg-[#badc58] hover:bg-[#6ab04c] text-[#121214] px-6 py-2 rounded font-bold uppercase text-xs shadow-[0_0_15px_rgba(186,220,88,0.4)] transition-all flex items-center gap-2">
        <i class="fa-solid fa-download"></i> Save Image
      </button>
    </div>
  </header>

  <main class="flex-1 flex overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 bg-[#1e1e24] border-r border-[#2a2a32] flex flex-col z-20 shadow-xl p-5 overflow-y-auto">
      <h2 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-4">Filters</h2>
      <div class="flex flex-col gap-3">
        <button class="filter-btn active bg-[#121214] border border-[#2a2a32] p-3 rounded-lg text-left" data-filter="normal">
          <div class="text-white font-bold text-sm mb-1"><i class="fa-solid fa-image text-gray-400 w-5"></i> Normal</div>
          <div class="text-[10px] text-gray-500">Original image (Pixelated)</div>
        </button>
        <button class="filter-btn bg-[#121214] border border-[#2a2a32] p-3 rounded-lg text-left" data-filter="gameboy">
          <div class="text-white font-bold text-sm mb-1"><i class="fa-solid fa-gamepad text-[#badc58] w-5"></i> Gameboy</div>
          <div class="text-[10px] text-gray-500">Classic 4-tone green palette</div>
        </button>
        <button class="filter-btn bg-[#121214] border border-[#2a2a32] p-3 rounded-lg text-left" data-filter="crt">
          <div class="text-white font-bold text-sm mb-1"><i class="fa-solid fa-tv text-[#ff7979] w-5"></i> CRT Monitor</div>
          <div class="text-[10px] text-gray-500">Scanlines and RGB shift</div>
        </button>
        <button class="filter-btn bg-[#121214] border border-[#2a2a32] p-3 rounded-lg text-left" data-filter="dither">
          <div class="text-white font-bold text-sm mb-1"><i class="fa-solid fa-chess-board text-[#e056fd] w-5"></i> 1-Bit Dither</div>
          <div class="text-[10px] text-gray-500">Bayer matrix stippling effect</div>
        </button>
      </div>

      <h2 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mt-8 mb-4">Resolution Downscale</h2>
      <input type="range" id="res-slider" min="1" max="8" value="4" class="w-full accent-[#badc58]">
      <div class="text-right text-xs font-mono font-bold text-white mt-1" id="res-val">1/4x</div>
    </aside>

    <!-- Workspace -->
    <section class="flex-1 flex flex-col p-8 bg-[#0d0d0f]">
      <div class="flex-1 checkered shadow-2xl border border-[#2a2a32] rounded-lg overflow-hidden relative">
        <div id="preview-container">
          <canvas id="main-canvas" class="pixelated"></canvas>
        </div>
      </div>
    </section>
  </main>

  <script>
    const E = id => document.getElementById(id);
    const canvas = E('main-canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    
    let originalImage = null;
    let currentFilter = 'normal';
    let downscale = 4;

    const bayerMatrix = [
      [ 0, 8, 2, 10],
      [12, 4, 14, 6],
      [ 3, 11, 1, 9],
      [15, 7, 13, 5]
    ]; // 4x4 matrix

    function applyFilter() {
      if(!originalImage) return;

      const w = Math.floor(originalImage.width / downscale);
      const h = Math.floor(originalImage.height / downscale);
      
      canvas.width = w;
      canvas.height = h;

      // Draw original first
      ctx.drawImage(originalImage, 0, 0, w, h);
      
      if(currentFilter === 'normal') return;

      const imgData = ctx.getImageData(0, 0, w, h);
      const data = imgData.data;

      // Create a copy for reading in effects like CRT
      const copyData = new Uint8ClampedArray(data);

      if(currentFilter === 'gameboy') {
        const gbColors = [
          [15, 56, 15],   // Darkest
          [48, 98, 48],
          [139, 172, 15],
          [155, 188, 15]  // Lightest
        ];
        
        for(let i=0; i<data.length; i+=4) {
          // Luma
          const brightness = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
          // Map to 0-3
          const idx = Math.min(3, Math.floor(brightness / 64));
          data[i] = gbColors[3-idx][0];
          data[i+1] = gbColors[3-idx][1];
          data[i+2] = gbColors[3-idx][2];
        }
      }
      else if(currentFilter === 'dither') {
        for(let y=0; y<h; y++) {
          for(let x=0; x<w; x++) {
            const i = (y*w + x) * 4;
            const brightness = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
            // Bayer threshold
            const threshold = (bayerMatrix[y%4][x%4] / 16.0) * 255;
            const bw = brightness > threshold ? 255 : 0;
            data[i] = bw;
            data[i+1] = bw;
            data[i+2] = bw;
          }
        }
      }
      else if(currentFilter === 'crt') {
        const shiftX = Math.max(1, Math.floor(w * 0.005));
        
        for(let y=0; y<h; y++) {
          for(let x=0; x<w; x++) {
            const i = (y*w + x) * 4;
            
            // RGB Shift
            // Red channel comes from left, Blue from right
            const redX = Math.max(0, x - shiftX);
            const blueX = Math.min(w-1, x + shiftX);
            
            data[i] = copyData[(y*w + redX) * 4]; // R
            data[i+1] = copyData[i+1]; // G stays
            data[i+2] = copyData[(y*w + blueX) * 4 + 2]; // B
            
            // Scanlines (darken every other line)
            if(y % 2 === 0) {
              data[i] *= 0.7;
              data[i+1] *= 0.7;
              data[i+2] *= 0.7;
            }
            
            // Vignette (darken edges)
            const cx = x - w/2;
            const cy = y - h/2;
            const dist = Math.sqrt(cx*cx + cy*cy);
            const maxDist = Math.sqrt(w*w/4 + h*h/4);
            const darken = Math.max(0, 1 - (dist / maxDist)*0.5);
            data[i] *= darken;
            data[i+1] *= darken;
            data[i+2] *= darken;
          }
        }
      }

      ctx.putImageData(imgData, 0, 0);
    }

    // UI Events
    E('btn-upload').onclick = () => E('file-upload').click();
    E('file-upload').onchange = e => {
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        const img = new Image();
        img.onload = () => {
          originalImage = img;
          applyFilter();
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    };

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        applyFilter();
      };
    });

    E('res-slider').oninput = e => {
      downscale = parseInt(e.target.value);
      E('res-val').textContent = `1/${downscale}x`;
      applyFilter();
    };

    E('btn-save').onclick = () => {
      if(!originalImage) return;
      const a = document.createElement('a');
      a.download = `filtered_${Date.now()}.png`;
      a.href = canvas.toDataURL();
      a.click();
    };

    // Load a default placeholder image
    const placeholder = new Image();
    placeholder.onload = () => { originalImage = placeholder; applyFilter(); };
    placeholder.src = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg=='; // Placeholder 1x1 pixel

  </script>
</body>
</html>
