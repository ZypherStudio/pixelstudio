<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iso-Studio</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  body{background:#121214;color:#e0e0e0;font-family:'Inter',sans-serif;overflow:hidden;user-select:none;}
  .pixelated{image-rendering:pixelated;}
  .color-btn{width:32px;height:32px;border-radius:6px;border:2px solid transparent;cursor:pointer;transition:transform 0.1s;}
  .color-btn:hover{transform:scale(1.1);}
  .color-btn.active{border-color:white;transform:scale(1.2);box-shadow:0 0 10px rgba(255,255,255,0.3);}
  #canvas-container{background-color:#2a2a2a;background-image:linear-gradient(45deg,#1e1e1e 25%,transparent 25%,transparent 75%,#1e1e1e 75%,#1e1e1e),linear-gradient(45deg,#1e1e1e 25%,transparent 25%,transparent 75%,#1e1e1e 75%,#1e1e1e);background-size:32px 32px;background-position:0 0,16px 16px;}
</style>
</head>
<body class="h-screen w-screen flex flex-col">
  <header class="h-16 bg-[#1e1e24] border-b border-[#2a2a32] flex items-center justify-between px-6 shrink-0 shadow-md z-30">
    <div class="flex items-center gap-4">
      <a href="menu.html" class="w-8 h-8 rounded bg-[#121214] flex items-center justify-center text-gray-400 hover:text-white border border-[#2a2a32]"><i class="fa-solid fa-arrow-left"></i></a>
      <h1 class="font-bold text-white uppercase tracking-wide flex items-center gap-2"><i class="fa-solid fa-cubes text-[#e056fd]"></i> Iso-Studio</h1>
    </div>
    <div class="flex gap-4 items-center">
      <button id="btn-clear" class="bg-red-500/20 hover:bg-red-500/40 text-red-400 border border-red-500/50 px-4 py-2 rounded font-bold uppercase text-xs transition-colors"><i class="fa-solid fa-trash-can"></i> Clear</button>
      <button id="btn-save" class="bg-[#e056fd] hover:bg-[#be2edd] text-white px-6 py-2 rounded font-bold uppercase text-xs shadow-[0_0_15px_rgba(224,86,253,0.4)] transition-all flex items-center gap-2">
        <i class="fa-solid fa-download"></i> Save PNG
      </button>
    </div>
  </header>

  <main class="flex-1 flex overflow-hidden">
    <!-- Workspace -->
    <section id="canvas-container" class="flex-1 relative cursor-crosshair overflow-hidden">
      <canvas id="iso-canvas" class="absolute top-0 left-0 w-full h-full"></canvas>
    </section>

    <!-- Sidebar Tools -->
    <aside class="w-64 bg-[#1e1e24] border-l border-[#2a2a32] flex flex-col z-20 shadow-xl">
      <div class="p-5 border-b border-[#2a2a32] bg-[#18181d]">
        <h2 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-4">Current Block</h2>
        <div class="flex items-center gap-4">
          <div id="active-swatch" class="w-12 h-12 rounded border-2 border-white shadow-lg relative overflow-hidden" style="background:#5a6b8c;">
            <!-- CSS pseudo 3D effect -->
            <div style="position:absolute;bottom:0;left:0;width:50%;height:100%;background:rgba(0,0,0,0.2);"></div>
            <div style="position:absolute;bottom:0;right:0;width:50%;height:100%;background:rgba(0,0,0,0.4);"></div>
          </div>
          <div>
            <div class="flex items-center gap-2 mb-2">
              <input type="radio" id="mode-build" name="mode" value="build" checked class="accent-[#e056fd]"> <label for="mode-build" class="text-xs font-bold text-white">Build</label>
            </div>
            <div class="flex items-center gap-2">
              <input type="radio" id="mode-erase" name="mode" value="erase" class="accent-[#e056fd]"> <label for="mode-erase" class="text-xs font-bold text-red-400">Erase</label>
            </div>
          </div>
        </div>
      </div>
      
      <div class="flex-1 p-5 overflow-y-auto">
        <h2 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-4">Palette</h2>
        <div id="palette-grid" class="flex flex-wrap gap-2"></div>
      </div>
    </aside>
  </main>

  <script>
    const E = id => document.getElementById(id);
    const canvas = E('iso-canvas');
    const ctx = canvas.getContext('2d');
    
    // Grid settings
    let tileW = 40;
    let tileH = 20;
    let blockH = 24; // Z height of a block
    let originX = 0;
    let originY = 0;
    
    // Map structure: "x,y,z" -> { color: "#hex" }
    let blocks = {};
    const gridSize = 20; // 20x20 floor

    // State
    let currentColor = '#5a6b8c';
    let mode = 'build';
    let hoverPos = null; // {x, y, z, face}
    let isDragging = false;
    let panX = 0, panY = 0, lastMouse = {x:0,y:0};

    const palette = ['#e0e0e0','#7f8c8d','#2c3e50','#e74c3c','#e67e22','#f1c40f','#2ecc71','#27ae60','#3498db','#2980b9','#9b59b6','#8e44ad','#e056fd','#ff7979','#badc58','#7ed6df'];

    function init() {
      // Resize
      const resize = () => {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
        originX = canvas.width / 2;
        originY = canvas.height / 4;
        render();
      };
      window.addEventListener('resize', resize);
      resize();

      // UI
      const pGrid = E('palette-grid');
      palette.forEach(c => {
        const b = document.createElement('div');
        b.className = 'color-btn';
        b.style.backgroundColor = c;
        if(c===currentColor) b.classList.add('active');
        b.onclick = () => {
          currentColor = c;
          E('active-swatch').style.backgroundColor = c;
          Array.from(pGrid.children).forEach(el=>el.classList.remove('active'));
          b.classList.add('active');
          E('mode-build').checked = true; mode = 'build';
        };
        pGrid.appendChild(b);
      });

      E('mode-build').onchange = () => mode='build';
      E('mode-erase').onchange = () => mode='erase';
      E('btn-clear').onclick = () => { if(confirm('Clear map?')){ blocks={}; render(); }};
      E('btn-save').onclick = () => {
        const a = document.createElement('a');
        a.download = `isostudio_${Date.now()}.png`;
        a.href = canvas.toDataURL();
        a.click();
      };

      // Events
      canvas.addEventListener('mousemove', onMouseMove);
      canvas.addEventListener('mousedown', e => {
        if(e.button===1 || e.button===2) { // Middle or Right click to pan
          isDragging=true; lastMouse={x:e.clientX, y:e.clientY};
        } else { // Left click
          handleAction();
        }
      });
      canvas.addEventListener('mouseup', () => isDragging=false);
      canvas.addEventListener('contextmenu', e => e.preventDefault());
      canvas.addEventListener('wheel', e => {
        // Zoom functionality could go here, for now just pan
        panY -= e.deltaY; panX -= e.deltaX;
        render();
      });
    }

    function screenToIso(sx, sy) {
      sx -= (originX + panX);
      sy -= (originY + panY);
      const mw = tileW/2;
      const mh = tileH/2;
      // Without Z:
      // sx = (x - y) * mw
      // sy = (x + y) * mh
      // x = (sx/mw + sy/mh) / 2
      // y = (sy/mh - sx/mw) / 2
      return {
        x: (sx/mw + sy/mh) / 2,
        y: (sy/mh - sx/mw) / 2
      };
    }

    // Helper to calculate slightly darker/lighter colors for 3D effect
    function adjustColor(hex, amount) {
      let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
      r=Math.max(0,Math.min(255,r+amount));
      g=Math.max(0,Math.min(255,g+amount));
      b=Math.max(0,Math.min(255,b+amount));
      return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
    }

    function drawBlock(x, y, z, color, isHover) {
      const sx = originX + panX + (x - y) * (tileW / 2);
      const sy = originY + panY + (x + y) * (tileH / 2) - (z * blockH);

      const topC = isHover ? '#ffffff' : color;
      const leftC = isHover ? '#e0e0e0' : adjustColor(color, -30);
      const rightC = isHover ? '#cccccc' : adjustColor(color, -60);

      ctx.lineWidth = 1;
      ctx.lineJoin = 'round';
      ctx.strokeStyle = 'rgba(0,0,0,0.3)';

      // Top face
      ctx.fillStyle = topC;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(sx + tileW/2, sy + tileH/2);
      ctx.lineTo(sx, sy + tileH);
      ctx.lineTo(sx - tileW/2, sy + tileH/2);
      ctx.closePath();
      ctx.fill(); ctx.stroke();

      // Left face
      ctx.fillStyle = leftC;
      ctx.beginPath();
      ctx.moveTo(sx - tileW/2, sy + tileH/2);
      ctx.lineTo(sx, sy + tileH);
      ctx.lineTo(sx, sy + tileH + blockH);
      ctx.lineTo(sx - tileW/2, sy + tileH/2 + blockH);
      ctx.closePath();
      ctx.fill(); ctx.stroke();

      // Right face
      ctx.fillStyle = rightC;
      ctx.beginPath();
      ctx.moveTo(sx, sy + tileH);
      ctx.lineTo(sx + tileW/2, sy + tileH/2);
      ctx.lineTo(sx + tileW/2, sy + tileH/2 + blockH);
      ctx.lineTo(sx, sy + tileH + blockH);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
    }

    function drawFloor() {
      ctx.strokeStyle = 'rgba(255,255,255,0.05)';
      ctx.lineWidth = 1;
      for(let x=0; x<=gridSize; x++){
        const p1x = originX + panX + (x - 0) * (tileW/2);
        const p1y = originY + panY + (x + 0) * (tileH/2);
        const p2x = originX + panX + (x - gridSize) * (tileW/2);
        const p2y = originY + panY + (x + gridSize) * (tileH/2);
        ctx.beginPath(); ctx.moveTo(p1x,p1y); ctx.lineTo(p2x,p2y); ctx.stroke();
      }
      for(let y=0; y<=gridSize; y++){
        const p1x = originX + panX + (0 - y) * (tileW/2);
        const p1y = originY + panY + (0 + y) * (tileH/2);
        const p2x = originX + panX + (gridSize - y) * (tileW/2);
        const p2y = originY + panY + (gridSize + y) * (tileH/2);
        ctx.beginPath(); ctx.moveTo(p1x,p1y); ctx.lineTo(p2x,p2y); ctx.stroke();
      }
    }

    function render() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      drawFloor();

      // Convert map to array and sort by depth (x + y + z)
      let arr = [];
      for(let k in blocks){
        let [x,y,z] = k.split(',').map(Number);
        arr.push({x,y,z,color:blocks[k].color});
      }
      // Draw order: lowest z first, then lowest x+y (back to front)
      arr.sort((a,b) => {
        if(a.z !== b.z) return a.z - b.z;
        return (a.x + a.y) - (b.x + b.y);
      });

      arr.forEach(b => drawBlock(b.x, b.y, b.z, b.color, false));

      // Draw hover ghost block
      if(hoverPos) {
        if(mode==='build') {
          drawBlock(hoverPos.x, hoverPos.y, hoverPos.z, currentColor, true);
        } else {
          // Erase mode highlighting (drawn red-ish)
          if(blocks[`${hoverPos.x},${hoverPos.y},${hoverPos.z}`]) {
            drawBlock(hoverPos.x, hoverPos.y, hoverPos.z, '#ff0000', true);
          }
        }
      }
    }

    function onMouseMove(e) {
      if(isDragging) {
        panX += (e.clientX - lastMouse.x);
        panY += (e.clientY - lastMouse.y);
        lastMouse = {x:e.clientX, y:e.clientY};
        render();
        return;
      }

      // Raycasting algorithm: check from highest Z down to 0
      const mx = e.clientX - canvas.getBoundingClientRect().left;
      const my = e.clientY - canvas.getBoundingClientRect().top;

      let found = null;
      // Search from max Z (e.g. 10) down to 0
      for(let z=10; z>=0; z--){
        const iso = screenToIso(mx, my + (z*blockH));
        const gridX = Math.floor(iso.x);
        const gridY = Math.floor(iso.y);

        if(gridX>=0 && gridX<gridSize && gridY>=0 && gridY<gridSize) {
          // If a block exists here, or we hit z=0 (floor)
          if(blocks[`${gridX},${gridY},${z}`] || z===0) {
            // Determine if clicking Top, Left or Right face (simplification: assume top if we hit it)
            // For building, if we hit a block at Z, we place at Z+1.
            if(mode==='build') {
               if(blocks[`${gridX},${gridY},${z}`]) {
                 found = {x:gridX, y:gridY, z:z+1}; // stack on top
               } else {
                 found = {x:gridX, y:gridY, z:0}; // floor
               }
            } else {
               if(blocks[`${gridX},${gridY},${z}`]) {
                 found = {x:gridX, y:gridY, z:z}; // erase target
               }
            }
            break; // Stop at highest hit
          }
        }
      }

      hoverPos = found;
      render();
    }

    function handleAction() {
      if(!hoverPos) return;
      const k = `${hoverPos.x},${hoverPos.y},${hoverPos.z}`;
      if(mode==='build') {
        blocks[k] = { color: currentColor };
      } else {
        delete blocks[k];
      }
      render();
    }

    init();
  </script>
</body>
</html>
