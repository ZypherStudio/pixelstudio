<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Color Book</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  body{background:#121214;color:#e0e0e0;font-family:'Inter',sans-serif;overflow:hidden;user-select:none;}
  .pixelated{image-rendering:pixelated;}
  .checkered{background-color:#2a2a2a;background-image:linear-gradient(45deg,#1e1e1e 25%,transparent 25%,transparent 75%,#1e1e1e 75%,#1e1e1e),linear-gradient(45deg,#1e1e1e 25%,transparent 25%,transparent 75%,#1e1e1e 75%,#1e1e1e);background-size:16px 16px;background-position:0 0,8px 8px;}
  .color-btn{width:32px;height:32px;border-radius:6px;border:2px solid transparent;cursor:pointer;transition:transform 0.1s;}
  .color-btn:hover{transform:scale(1.1);}
  .color-btn.active{border-color:white;transform:scale(1.2);box-shadow:0 0 10px rgba(255,255,255,0.3);}
</style>
</head>
<body class="h-screen w-screen flex flex-col">
  <header class="h-16 bg-[#1e1e24] border-b border-[#2a2a32] flex items-center justify-between px-6 shrink-0 shadow-md">
    <div class="flex items-center gap-4">
      <a href="menu.html" class="w-8 h-8 rounded bg-[#121214] flex items-center justify-center text-gray-400 hover:text-white border border-[#2a2a32]"><i class="fa-solid fa-arrow-left"></i></a>
      <h1 class="font-bold text-white uppercase tracking-wide flex items-center gap-2"><i class="fa-solid fa-fill-drip text-[#38b764]"></i> Color Book</h1>
    </div>
    <div class="flex gap-2">
      <input type="file" id="img-upload" accept="image/*" class="hidden">
      <button id="btn-upload" class="bg-[#38b764] hover:bg-[#42c86f] text-white px-4 py-2 rounded font-bold uppercase text-xs shadow-lg"><i class="fa-solid fa-upload"></i> Upload Image</button>
    </div>
  </header>
  <main class="flex-1 flex overflow-hidden">
    <section class="flex-1 flex flex-col items-center justify-center relative p-8">
      <div class="absolute top-4 right-4 w-48 bg-[#1e1e24] border border-[#2a2a32] rounded-lg shadow-2xl overflow-hidden z-20">
        <div class="bg-[#18181d] px-3 py-2 text-[10px] font-bold text-gray-400 uppercase">Target Image</div>
        <div class="aspect-square checkered w-full"><canvas id="target-canvas" class="w-full h-full pixelated"></canvas></div>
      </div>
      <div class="checkered shadow-2xl border border-[#2a2a32] rounded-lg overflow-hidden bg-white" style="width:512px;height:512px;">
        <canvas id="main-canvas" width="64" height="64" class="w-full h-full pixelated cursor-crosshair"></canvas>
      </div>
      <div class="mt-6 flex gap-4 items-center bg-[#1e1e24] px-6 py-3 rounded-full border border-[#2a2a32]">
        <span class="text-xs font-bold text-gray-400">Grid:</span>
        <input type="range" id="complexity" min="16" max="128" value="64" step="16" class="w-32">
        <span id="complexity-val" class="text-xs font-mono">64x64</span>
      </div>
    </section>
    <aside class="w-80 bg-[#1e1e24] border-l border-[#2a2a32] flex flex-col z-20 shadow-xl">
      <div class="p-5 border-b border-[#2a2a32] bg-[#18181d]">
        <h2 class="text-xs font-bold text-gray-500 uppercase mb-4">Color Palette</h2>
        <div class="flex items-center gap-4 mb-4"><div id="active-swatch" class="w-10 h-10 rounded border-2 border-white" style="background:#000;"></div><div class="text-sm font-bold text-white">Flood Fill</div></div>
        <div class="w-full h-2 bg-[#121214] rounded-full overflow-hidden border border-[#2a2a32]"><div id="progress-bar" class="h-full bg-[#38b764] w-0 transition-all"></div></div>
        <div class="flex justify-between mt-2 text-[10px] font-bold text-gray-400"><span>Progress</span><span id="progress-text">0%</span></div>
      </div>
      <div class="flex-1 p-5 overflow-y-auto"><div id="palette-grid" class="flex flex-wrap gap-2"></div></div>
    </aside>
  </main>
  <script>
    const E = id => document.getElementById(id), mainCanvas = E('main-canvas'), mainCtx = mainCanvas.getContext('2d',{willReadFrequently:true});
    const targetCanvas = E('target-canvas'), targetCtx = targetCanvas.getContext('2d',{willReadFrequently:true});
    let gridSize=64, img=null, palette=[], currentColor='#000000', outline=[], colorGrid=[], target=[], total=0;
    
    E('btn-upload').onclick=()=>E('img-upload').click();
    E('img-upload').onchange=e=>{ const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=ev=>{img=new Image();img.onload=process;img.src=ev.target.result;}; r.readAsDataURL(f); };
    E('complexity').onchange=e=>{ gridSize=parseInt(e.target.value); E('complexity-val').textContent=gridSize+'x'+gridSize; if(img)process(); };
    
    function process(){
      mainCanvas.width=gridSize; mainCanvas.height=gridSize; targetCanvas.width=gridSize; targetCanvas.height=gridSize;
      targetCtx.fillStyle='#fff'; targetCtx.fillRect(0,0,gridSize,gridSize);
      const s=Math.min(gridSize/img.width, gridSize/img.height), w=img.width*s, h=img.height*s; targetCtx.drawImage(img,(gridSize-w)/2,(gridSize-h)/2,w,h);
      
      const d=targetCtx.getImageData(0,0,gridSize,gridSize), counts={}; target=Array(gridSize).fill().map(()=>Array(gridSize).fill(null));
      for(let i=0;i<d.data.length;i+=4){
        if(d.data[i+3]<128){d.data[i]=d.data[i+1]=d.data[i+2]=d.data[i+3]=255;}
        let r=Math.round(d.data[i]/32)*32, g=Math.round(d.data[i+1]/32)*32, b=Math.round(d.data[i+2]/32)*32;
        r=Math.min(255,r); g=Math.min(255,g); b=Math.min(255,b);
        d.data[i]=r; d.data[i+1]=g; d.data[i+2]=b;
        const hex="#"+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
        const x=(i/4)%gridSize, y=Math.floor((i/4)/gridSize); target[y][x]=hex; counts[hex]=(counts[hex]||0)+1;
      }
      targetCtx.putImageData(d,0,0);
      palette=Object.keys(counts).filter(c=>c.toUpperCase()!=='#FFFFFF').sort((a,b)=>counts[b]-counts[a]).slice(0,30);
      
      outline=Array(gridSize).fill().map(()=>Array(gridSize).fill(false)); colorGrid=Array(gridSize).fill().map(()=>Array(gridSize).fill(null)); total=0;
      for(let y=0;y<gridSize;y++)for(let x=0;x<gridSize;x++){
        const c=target[y][x]; let e=false; if(x<gridSize-1&&target[y][x+1]!==c)e=true; if(y<gridSize-1&&target[y+1][x]!==c)e=true;
        if(e&&c.toUpperCase()!=='#FFFFFF') outline[y][x]=true; else if(c.toUpperCase()!=='#FFFFFF') total++;
      }
      if(palette.length>0)setColor(palette[0]); renderUI(); render(); updateProgress();
    }
    
    function renderUI(){
      const g=E('palette-grid'); g.innerHTML='';
      palette.forEach(h=>{ const b=document.createElement('div'); b.className='color-btn'; b.style.backgroundColor=h; b.onclick=()=>setColor(h); g.appendChild(b); });
      setColor(currentColor);
    }
    function setColor(h){ currentColor=h; E('active-swatch').style.backgroundColor=h; Array.from(E('palette-grid').children).forEach(c=>c.style.backgroundColor===h?c.classList.add('active'):c.classList.remove('active')); }
    function render(){ mainCtx.fillStyle='#fff'; mainCtx.fillRect(0,0,gridSize,gridSize); for(let y=0;y<gridSize;y++)for(let x=0;x<gridSize;x++){ if(outline[y][x]){mainCtx.fillStyle='#222';mainCtx.fillRect(x,y,1,1);} else if(colorGrid[y][x]){mainCtx.fillStyle=colorGrid[y][x];mainCtx.fillRect(x,y,1,1);} } }
    
    mainCanvas.onmousedown=e=>{
      if(!img)return; const r=mainCanvas.getBoundingClientRect(), x=Math.floor((e.clientX-r.left)/(r.width/gridSize)), y=Math.floor((e.clientY-r.top)/(r.height/gridSize));
      if(outline[y][x] || colorGrid[y][x]===currentColor)return;
      const t=colorGrid[y][x], st=[[x,y]];
      while(st.length>0){ const[cx,cy]=st.pop(); if(cx<0||cx>=gridSize||cy<0||cy>=gridSize||outline[cy][cx]||colorGrid[cy][cx]!==t)continue; colorGrid[cy][cx]=currentColor; st.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]); }
      render(); updateProgress();
    };
    function updateProgress(){
      if(total===0)return; let p=0; for(let y=0;y<gridSize;y++)for(let x=0;x<gridSize;x++)if(!outline[y][x]&&target[y][x].toUpperCase()!=='#FFFFFF'&&colorGrid[y][x])p++;
      const pct=Math.round((p/total)*100); E('progress-bar').style.width=pct+'%'; E('progress-text').textContent=pct+'%';
    }
  </script>
</body>
</html>
